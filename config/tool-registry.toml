# Tool registry for Remote Workhorse Phase 1.
# This is policy and routing metadata, not a secrets file.

[policy]
phase = "remote-workhorse.phase1"
default_on_missing = "repair_card"
default_verdict_on_missing_required = "BLOCK"
default_verdict_on_missing_optional = "FLAG"
local_nix_role = "optional_accelerator"
remote_nix_role = "remote_preflight_required"

[[tools]]
id = "codex"
class = "agent_runtime"
required = true
local_probe = ["codex", "--version"]
repair = "Fix Codex CLI/runtime path before claiming local workhorse readiness."

[[tools]]
id = "codex_mcp_list"
class = "tool_truth"
required = true
local_probe = ["codex", "mcp", "list"]
repair = "Refresh Codex session or project config, then rerun mcp list."

[[tools]]
id = "research_vault"
class = "memory_research"
required = true
proof_file = "docs/remote-workhorse/phase1/RESEARCH_VAULT_PROOF.json"
repair = "Create RV_REPAIR_CARD with health, taxonomy, search query, error, and owner action."

[[tools]]
id = "code_review_graph"
class = "code_graph"
required = false
proof_file = "docs/remote-workhorse/phase1/CODE_REVIEW_GRAPH_PROOF.json"
repair = "Register the target repo and prove graph freshness before graph-dependent review claims."

[[tools]]
id = "cargo_rustc"
class = "build_runtime"
required = true
local_probe = ["cargo", "--version"]
repair = "Install or activate Rust toolchain 1.94.1."

[[tools]]
id = "nix"
class = "frontier_remote_runtime"
required = false
local_probe = ["nix", "--version"]
repair = "If /Volumes/Nix Store is mounted but nix is absent, restore /nix activation/synthetic mount or defer Nix execution to the remote NixOS cell."

[[tools]]
id = "just"
class = "operator_ergonomics"
required = false
local_probe = ["just", "--version"]
repair = "Install just or use scripts/check.sh fallback."

[[tools]]
id = "doctl"
class = "cloud_operator"
required = false
local_probe = ["doctl", "version"]
repair = "Install doctl and authenticate only when remote provisioning is in scope."

[[preflight_gates]]
id = "doctl_account_read"
required_before = "cloud_snapshot_or_firewall_change"
probe = ["doctl", "account", "get", "--format", "Status", "--no-header"]
repair = "Refresh doctl auth before relying on DigitalOcean account, snapshot, firewall, or droplet evidence."

[[preflight_gates]]
id = "doctl_read_only_inventory"
required_before = "remote_host_selection_or_cloud_mutation"
probe = [
  "doctl account ratelimit --format Remaining,Reset --no-header",
  "doctl compute droplet list --format ID,Name,PublicIPv4,PrivateIPv4,Region,Image,Status,Tags,Features,Volumes --no-header",
  "doctl compute ssh-key list --format ID,Name,FingerPrint --no-header",
  "doctl compute snapshot list --format ID,Name,CreatedAt,Regions,ResourceId,ResourceType,MinDiskSize,Size,Tags --no-header",
  "doctl compute image list --format ID,Name,Type,Distribution,Slug,Public,MinDisk --no-header",
  "doctl compute image list --public --format ID,Name,Distribution,Slug,Public,MinDisk --no-header",
  "doctl compute firewall list --format ID,Name,Status,DropletIDs,Tags,PendingChanges --no-header",
  "doctl compute region list --format Slug,Available --no-header",
  "doctl compute size list --format Slug,Memory,VCPUs,Disk,PriceMonthly --no-header",
  "doctl compute volume list --format ID,Name,Size,Region,DropletIDs,Tags --no-header",
]
repair = "Keep cloud operations read-only until account auth, object inventory, firewall posture, and rollback candidates are captured."

[[preflight_gates]]
id = "remote_host_identity"
required_before = "computer_use_mutation"
probe = ["ssh-keyscan -T 5 <host>", "hostnamectl", "cat /etc/os-release", "uname -a"]
repair = "Set WINDBURN_REMOTE_HOST, capture SSH host key proof, and capture read-only host identity before mutation."

[[preflight_gates]]
id = "rollback_gotchas"
required_before = "nixos_rebuild_or_firewall_attach"
probe = ["snapshot/image candidate", "firewall SSH+443 posture", "known_hosts plan", "size/region/image/volume fit"]
repair = "Prove backout path before rebuilds; host key changes, firewall misrules, missing snapshots, and invalid image/size/volume choices must be repair-carded."

[[preflight_gates]]
id = "remote_nix_truth"
required_before = "nixos_rebuild"
probe = ["nix --version", "nix flake metadata --json"]
repair = "Do not run nixos-rebuild until remote Nix and flake metadata are proven."

[[disabled_by_design]]
id = "figma"
reason = "Not required for Phase 1 runtime evidence."

[[disabled_by_design]]
id = "notion"
reason = "Avoid adding private workspace dependency to runtime proof path."

[[disabled_by_design]]
id = "cloudflare-api"
reason = "Cloud-provider writes require explicit operator approval."
